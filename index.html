<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Equipment Tracker</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const THEMES = {
      light: {
        bg: "#f0f2f0", surface: "#ffffff", panel: "#ffffff", border: "#e2e8e4", borderLight: "#eef1ef",
        accent: "#0d9488", accentText: "#ffffff", accentBg: "#e6f4f2",
        danger: "#dc2626", dangerBg: "#fef2f2", success: "#059669", successBg: "#ecfdf5",
        warning: "#d97706", warningBg: "#fffbeb", text: "#1a2e2a", textMid: "#4a6660", muted: "#8fa89f",
        headerBg: "#ffffff", shadow: "0 1px 3px rgba(0,0,0,0.06)",
      },
      dark: {
        bg: "#141f1d", surface: "#1e2d2a", panel: "#1e2d2a", border: "#2d4039", borderLight: "#243530",
        accent: "#14b8a6", accentText: "#0d1a18", accentBg: "#14342f",
        danger: "#f87171", dangerBg: "#2d1515", success: "#34d399", successBg: "#0d2d20",
        warning: "#fbbf24", warningBg: "#2d2010", text: "#e8f0ee", textMid: "#9bbdb5", muted: "#5a7a72",
        headerBg: "#182420", shadow: "0 1px 3px rgba(0,0,0,0.3)",
      },
    };

    const REQUIRED_ITEMS = [
      {
        id: "req_regie",
        name: "Set: 9m regie desk P&D - black - H=1m20",
        description: "Regie desk / mengpaneel opstelling",
        matches: ["regie desk", "9m regie", "regie desk p&d", "regie"],
        checklist_items: ["Regie desk"],
      },
      {
        id: "req_schuko",
        name: "Schuko kit",
        description: "Schuko / domino's + stekkerdozen",
        matches: ["schuko", "cakit schuko", "cakit-schuko", "domino", "stekkerdoos", "schucko", "shucko", "cakit"],
        checklist_items: ["Schuko / domino's", "Stekkerdozen"],
      },
      {
        id: "req_xlr3",
        name: "XLR 3-pin kabels",
        description: "XLR 3-pin audiokabels",
        matches: ["xlr 3", "xlr3", "xlr 3pin", "xlr 3-pin", "xlr drie", "cablekit xlr", "cablekit aes 3p"],
        checklist_items: ["XLR 3-pin kabels"],
      },
      {
        id: "req_xlr5",
        name: "XLR 5-pin kabels",
        description: "XLR 5-pin DMX kabels",
        matches: ["xlr 5", "xlr5", "xlr 5pin", "xlr 5-pin", "xlr vijf", "dmx"],
        checklist_items: ["XLR 5-pin kabels"],
      },
      {
        id: "req_utp",
        name: "UTP / ethercon kabels",
        description: "Netwerkkabels / ethercon",
        matches: ["utp", "ethercon", "ethernet", "cat5", "cat6", "network"],
        checklist_items: ["UTP / ethercon kabels"],
      },
      {
        id: "req_consumable",
        name: "Consumablekit OF Production toolcase",
        description: "Consumablekit (gaffa, tape, kabelbinders) of production toolcase",
        matches: ["consumablekit", "consumable kit", "consumable", "toolcase", "tool case", "production toolcase", "gaffa", "gaffer", "kabelbinders"],
        checklist_items: ["Consumablekit", "Production toolcase"],
      },
      {
        id: "req_video",
        name: "Videokit",
        description: "HDMI's, SDI's en USB-C naar HDMI kabels",
        matches: ["videokit", "video kit", "hdmi", "sdi", "usb-c hdmi", "usb c hdmi", "displayport", "video"],
        checklist_items: ["HDMI kabels", "SDI kabels", "USB-C HDMI adapters"],
      },
    ];

    const DEFAULT_CATEGORIES = [
      { id: "studio", label: "Studio Equipment", icon: "🎛️", items: [
        { id: "regie", name: "Regie desk" },
      ]},
      { id: "kabels", label: "Kabels", icon: "🔌", items: [
        { id: "xlr3", name: "XLR 3-pin kabels" }, { id: "xlr5", name: "XLR 5-pin kabels" },
        { id: "speakon", name: "Speakon kabels" }, { id: "utp", name: "UTP / ethercon kabels" },
        { id: "powercon", name: "Powercon kabels" }, { id: "hdmi", name: "HDMI kabels" },
        { id: "sdi", name: "SDI kabels" }, { id: "usb_c_hdmi", name: "USB-C HDMI adapters" },
        { id: "jack", name: "Jack kabels (6.35mm)" },
      ]},
      { id: "stroom", label: "Stroom & Distributie", icon: "⚡", items: [
        { id: "schuko", name: "Schuko / domino's" }, { id: "stekkerdoos", name: "Stekkerdozen" },
        { id: "verlengsnoer", name: "Verlengsnoeren" },
        { id: "distro", name: "Stroom distro" },
      ]},
      { id: "kits", label: "Kits & Cases", icon: "🧰", items: [
        { id: "consumable", name: "Consumablekit" }, { id: "toolcase", name: "Production toolcase" },
        { id: "videokit", name: "Videokit" }, { id: "cakit", name: "CAKIT Schuko" },
      ]},
      { id: "extras", label: "⭐ Extras (niet vergeten!)", icon: "⭐", items: [
        { id: "event_fabric", name: "Event Fabric" }, { id: "cable_crossover", name: "Cable crossover" },
        { id: "spanriemen", name: "Spanriemen" },
      ]},
      { id: "veiligheid", label: "Veiligheid & Toegang", icon: "🪜", items: [
        { id: "ladder", name: "Ladder" }, { id: "stelling", name: "Stelling / rolsteiger" },
        { id: "klimpak", name: "Klimpak / harnas" }, { id: "lifeline", name: "Lifeline / veiligheidslijn" },
        { id: "helm", name: "Veiligheidshelm" },
      ]},
      { id: "audio", label: "Audio", icon: "🔊", items: [
        { id: "micros", name: "Microfoons" }, { id: "microstands", name: "Microfoonstandaards" },
        { id: "iem", name: "IEM systeem" }, { id: "mixer", name: "Mengpaneel" },
        { id: "ampli", name: "Versterkers" }, { id: "speakers", name: "Luidsprekers" },
        { id: "subwoofers", name: "Subwoofers" }, { id: "di_box", name: "DI boxes" },
      ]},
      { id: "licht", label: "Licht", icon: "💡", items: [
        { id: "moving_head", name: "Moving heads" }, { id: "par_cans", name: "PAR cans" },
        { id: "dmx_controller", name: "DMX controller" }, { id: "followspot", name: "Followspot" },
        { id: "hazer", name: "Hazer / rookmachine" },
      ]},
    ];

    const FOUND_TO_CHECKLIST = {
      "Regie desk": "regie", "XLR 3-pin kabels": "xlr3", "XLR 5-pin kabels": "xlr5",
      "HDMI kabels": "hdmi", "SDI kabels": "sdi", "USB-C HDMI adapters": "usb_c_hdmi",
      "UTP / ethercon kabels": "utp", "Speakon kabels": "speakon", "Powercon kabels": "powercon",
      "Jack kabels (6.35mm)": "jack", "Schuko / domino's": "schuko", "Stekkerdozen": "stekkerdoos",
      "Consumablekit": "consumable", "Production toolcase": "toolcase", "Videokit": "videokit",
      "CAKIT Schuko": "cakit", "Event Fabric": "event_fabric", "Cable crossover": "cable_crossover",
      "Spanriemen": "spanriemen", "Ladder": "ladder", "Stelling / rolsteiger": "stelling",
      "Klimpak / harnas": "klimpak", "Lifeline / veiligheidslijn": "lifeline", "Veiligheidshelm": "helm",
      "Microfoons": "micros", "Microfoonstandaards": "microstands", "IEM systeem": "iem",
      "Mengpaneel": "mixer", "Versterkers": "ampli", "Luidsprekers": "speakers", "Subwoofers": "subwoofers",
      "DI boxes": "di_box", "Moving heads": "moving_head", "PAR cans": "par_cans",
      "DMX controller": "dmx_controller", "Followspot": "followspot", "Hazer / rookmachine": "hazer",
      "Verlengsnoeren": "verlengsnoer", "Stroom distro": "distro",
    };

    function checkRequiredInText(docText) {
      const lower = docText.toLowerCase();
      return REQUIRED_ITEMS.map((req) => ({
        ...req,
        found: req.matches.some((m) => lower.includes(m.toLowerCase())),
      }));
    }

    function checkConditionalItems(docText) {
      const lower = docText.toLowerCase();
      const conditional = [];
      if (lower.includes("cacom kabel") || lower.includes("cacom cablage") || lower.includes("cacom")) {
        conditional.push({
          id: "cacom",
          name: "CACOM Couplers",
          description: "Nodig voor CACOM cablage",
          reason: "CACOM cablage gevonden in bon",
          found: false,
        });
      }
      if (lower.includes("32a") || lower.includes("63a") || lower.includes("125a") || lower.includes("krachtstroom")) {
        conditional.push({
          id: "generator",
          name: "Aggregaat",
          description: "Nodig voor krachtstroom",
          reason: "Krachtstroom (32A/63A/125A) gevonden in bon",
          found: false,
        });
      }
      return conditional;
    }

    async function extractPdfText(file) {
      if (!window.pdfjsLib) {
        window.pdfjsLib = pdfjsLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = "";
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map((item) => item.str).join(" ") + "\n";
      }
      return fullText;
    }

    function readFileAsText(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.onerror = () => rej(new Error("Leesfout"));
        r.readAsText(file, "utf-8");
      });
    }

    async function analyseDocuments(files, allItems, setStatus) {
      const itemNames = allItems.map((i) => i.name).join(", ");
      const contentBlocks = [];
      let combinedText = "";

      for (const file of files) {
        const isPdf = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");
        setStatus(`📖 Tekst inlezen uit ${file.name}...`);
        let text = "";
        if (isPdf) {
          try {
            text = await extractPdfText(file);
            if (!text.trim()) throw new Error("Lege PDF");
          } catch (e) {
            throw new Error(`Kon PDF niet lezen: ${e.message}`);
          }
        } else {
          text = await readFileAsText(file);
        }
        combinedText += text + "\n\n";
        contentBlocks.push({ type: "text", text: `[${file.name}]\n\n${text}` });
      }

      setStatus("🤖 AI analyseert de documenten...");
      contentBlocks.push({
        type: "text",
        text: `Analyseer documenten (werkbon/magazijnbon). Kits: CAKIT SCHUKO bevat schuko's+stekkerdozen, Toolcase bevat gaffa+tape, Videokit bevat HDMI+SDI+USB-C. Aliassen: "Cable Jack-MONO"=Jack kabels, "Frontlicht"=PAR cans. Geef items uit: ${itemNames}. JSON-array alleen.`,
      });

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: contentBlocks }] }),
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      const raw = data.content?.map((b) => b.text || "").join("") || "[]";
      let found = [];
      try { found = JSON.parse(raw.replace(/```json|```/g, "").trim()); } catch {}

      const requiredResults = checkRequiredInText(combinedText);
      const conditionalItems = checkConditionalItems(combinedText);
      return { found, requiredResults, conditionalItems, rawText: combinedText };
    }

    function App() {
      const [theme, setTheme] = useState("light");
      const [tab, setTab] = useState("checklist");
      const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
      const [checked, setChecked] = useState({});
      const [newItemName, setNewItemName] = useState("");
      const [addingTo, setAddingTo] = useState(null);
      const [werkbon, setWerkbon] = useState(null);
      const [magazijnbon, setMagazijnbon] = useState(null);
      const [analysing, setAnalysing] = useState(false);
      const [analyseStatus, setAnalyseStatus] = useState("");
      const [foundItems, setFoundItems] = useState(null);
      const [requiredResults, setRequiredResults] = useState(null);
      const [conditionalItems, setConditionalItems] = useState(null);
      const [analyseError, setAnalyseError] = useState("");

      const C = THEMES[theme];
      const allItems = categories.flatMap((c) => c.items);
      const toggleCheck = (id) => setChecked((p) => ({ ...p, [id]: !p[id] }));
      const addItem = (catId) => {
        const name = newItemName.trim(); if (!name) return;
        setCategories((p) => p.map((c) => c.id === catId ? { ...c, items: [...c.items, { id: `c_${Date.now()}`, name }] } : c));
        setNewItemName(""); setAddingTo(null);
      };
      const removeItem = (catId, itemId) => {
        setCategories((p) => p.map((c) => c.id === catId ? { ...c, items: c.items.filter((i) => i.id !== itemId) } : c));
        setChecked((p) => { const n = { ...p }; delete n[itemId]; return n; });
      };

      const handleAnalyse = async () => {
        const files = [werkbon, magazijnbon].filter(Boolean);
        if (!files.length) { setAnalyseError("Upload minstens één document."); return; }
        setAnalyseError(""); setAnalysing(true); setFoundItems(null); setRequiredResults(null); setConditionalItems(null); setAnalyseStatus("");
        try {
          const { found, requiredResults: rr, conditionalItems: ci } = await analyseDocuments(files, allItems, setAnalyseStatus);
          setFoundItems(found); setRequiredResults(rr); setConditionalItems(ci);
          
          const newChecked = { ...checked };
          found.forEach((itemName) => {
            const checklistId = FOUND_TO_CHECKLIST[itemName];
            if (checklistId) newChecked[checklistId] = true;
          });
          rr.forEach((req) => {
            if (req.found) {
              req.checklist_items.forEach((itemName) => {
                const checklistId = FOUND_TO_CHECKLIST[itemName];
                if (checklistId) newChecked[checklistId] = true;
              });
            }
          });
          setChecked(newChecked);
          setTab("missing"); 
          setAnalyseStatus("");
        } catch (e) { setAnalyseError(e.message); setAnalyseStatus(""); }
        finally { setAnalysing(false); }
      };

      const missingItems = foundItems ? allItems.filter((i) => !foundItems.includes(i.name) && !checked[i.id]) : [];
      const missingRequired = requiredResults ? requiredResults.filter((r) => !r.found) : [];
      const checkedCount = Object.values(checked).filter(Boolean).length;
      const totalMissing = missingItems.length + missingRequired.length;

      const css = {
        app: { minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'Inter','Segoe UI',sans-serif", fontSize: 14 },
        header: { background: C.headerBg, borderBottom: `1px solid ${C.border}`, padding: "0 20px", height: 52, display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 50 },
        logo: { display: "flex", alignItems: "center", gap: 8, fontWeight: 700, fontSize: 15, color: C.accent },
        logoDot: { width: 12, height: 12, borderRadius: "50%", background: C.accent },
        pillGroup: { display: "flex", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 99, padding: 3, gap: 2 },
        pillBtn: (active) => ({ padding: "5px 14px", borderRadius: 99, border: "none", fontSize: 12, fontWeight: active ? 600 : 500, cursor: "pointer", background: active ? C.accent : "transparent", color: active ? C.accentText : C.textMid }),
        tabBar: { background: C.headerBg, borderBottom: `1px solid ${C.border}`, padding: "0 20px", display: "flex", alignItems: "center", gap: 4, height: 46, position: "sticky", top: 52, zIndex: 49 },
        tabLabel: { fontSize: 12, color: C.muted, fontWeight: 500, marginRight: 8 },
        tabPill: (active) => ({ padding: "6px 16px", borderRadius: 99, border: `1.5px solid ${active ? C.accent : C.border}`, background: active ? C.accent : C.surface, color: active ? C.accentText : C.textMid, fontWeight: active ? 600 : 500, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }),
        main: { padding: "20px", maxWidth: 820, margin: "0 auto" },
        card: { background: C.panel, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 18px", marginBottom: 12, boxShadow: C.shadow },
        cardHeader: { display: "flex", alignItems: "center", gap: 8, marginBottom: 12, paddingBottom: 10, borderBottom: `1px solid ${C.borderLight}` },
        cardTitle: { margin: 0, fontSize: 13, fontWeight: 600, color: C.text, flex: 1, display: "flex", alignItems: "center", gap: 6 },
        stat: (type) => ({ padding: "4px 12px", borderRadius: 99, fontSize: 12, fontWeight: 600, background: type==="success"?C.successBg:type==="danger"?C.dangerBg:C.accentBg, color: type==="success"?C.success:type==="danger"?C.danger:C.accent }),
        row: { display: "flex", alignItems: "center", gap: 10, padding: "9px 0", borderBottom: `1px solid ${C.borderLight}` },
        checkbox: { width: 16, height: 16, accentColor: C.accent, cursor: "pointer" },
        btn: (primary) => ({ padding: "8px 16px", borderRadius: 99, border: "none", background: primary?C.accent:C.border, color: primary?C.accentText:C.text, fontWeight: 600, fontSize: 13, cursor: "pointer" }),
        input: { background: C.bg, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: "7px 12px", color: C.text, fontSize: 13, outline: "none", width: "100%" },
      };

      const FileCard = ({ label, icon, file, setFile }) => (
        <div style={css.card}>
          <h2 style={css.cardTitle}><span>{icon}</span> {label}</h2>
          <label style={{ border: `2px dashed ${file?C.success:C.border}`, borderRadius: 10, padding: "20px", textAlign: "center", cursor: "pointer", display: "block", color: file?C.success:C.muted }}>
            {file ? <div><div style={{fontSize:24}}>✓</div><strong>{file.name}</strong></div> : <div><div style={{fontSize:24}}>📄</div>Klik om {label.toLowerCase()} te uploaden</div>}
            <input type="file" accept=".pdf,.txt,.csv" style={{ display: "none" }} onChange={(e) => setFile(e.target.files[0]||null)} />
          </label>
          {file && <button style={{...css.btn(false), marginTop:8, fontSize:12}} onClick={() => setFile(null)}>× Verwijder</button>}
        </div>
      );

      return (
        <div style={css.app}>
          <div style={css.header}>
            <div style={css.logo}><div style={css.logoDot} /> Equipment Tracker</div>
            <div style={css.pillGroup}>
              <button style={css.pillBtn(theme==="light")} onClick={() => setTheme("light")}>☀️ Dag</button>
              <button style={css.pillBtn(theme==="dark")} onClick={() => setTheme("dark")}>🌙 Nacht</button>
            </div>
          </div>

          <div style={css.tabBar}>
            <span style={css.tabLabel}>Weergave</span>
            <button style={css.tabPill(tab==="checklist")} onClick={() => setTab("checklist")}>✅ Checklist</button>
            <button style={css.tabPill(tab==="upload")} onClick={() => setTab("upload")}>📄 Documenten</button>
            <button style={css.tabPill(tab==="missing")} onClick={() => setTab("missing")}>Ontbrekend{foundItems && totalMissing > 0 && <span style={{background:C.danger,color:"#fff",borderRadius:99,fontSize:10,fontWeight:700,width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center"}}>{totalMissing}</span>}</button>
          </div>

          <div style={css.main}>
            {tab === "checklist" && (
              <>
                <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
                  <span style={css.stat("success")}>{checkedCount} afgevinkt</span>
                  <span style={css.stat("neutral")}>{allItems.length-checkedCount} resterend</span>
                  {foundItems && <span style={css.stat("primary")}>{foundItems.length} in documenten</span>}
                </div>

                <div style={{ ...css.card, border: `1.5px solid ${C.danger}55` }}>
                  <h2 style={css.cardTitle}>🚨 Verplichte items</h2>
                  {REQUIRED_ITEMS.map((req) => {
                    const result = requiredResults?.find((r) => r.id === req.id);
                    const isFound = result?.found;
                    return (
                      <div key={req.id} style={css.row}>
                        <span style={{ fontSize: 16, color: isFound ? C.success : requiredResults ? C.danger : C.muted }}>
                          {isFound ? "✓" : requiredResults ? "✗" : "·"}
                        </span>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 600, color: C.text, fontSize: 13 }}>{req.name}</div>
                          <div style={{ fontSize: 11, color: C.muted, marginTop: 1 }}>{req.description}</div>
                        </div>
                        {isFound && <span style={css.stat("success")}>gevonden ✓</span>}
                        {requiredResults && !isFound && <span style={css.stat("danger")}>ONTBREEKT</span>}
                      </div>
                    );
                  })}
                </div>

                {categories.map((cat) => (
                  <div key={cat.id} style={css.card}>
                    <h2 style={css.cardTitle}><span>{cat.icon}</span> {cat.label}</h2>
                    {cat.items.map((item) => {
                      const isChecked = !!checked[item.id];
                      return (
                        <div key={item.id} style={css.row}>
                          <input type="checkbox" style={css.checkbox} checked={isChecked} onChange={() => toggleCheck(item.id)} />
                          <span style={{ flex:1, color: isChecked?C.muted:C.text, textDecoration: isChecked?"line-through":"none" }}>{item.name}</span>
                          <button onClick={() => removeItem(cat.id,item.id)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16}}>×</button>
                        </div>
                      );
                    })}
                    {addingTo===cat.id ? (
                      <div style={{ display:"flex",gap:8,marginTop:10 }}>
                        <input style={{...css.input,flex:1}} placeholder="Nieuw item..." value={newItemName} onChange={(e)=>setNewItemName(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&addItem(cat.id)} autoFocus />
                        <button style={css.btn(true)} onClick={()=>addItem(cat.id)}>Voeg toe</button>
                      </div>
                    ) : (
                      <button style={{...css.btn(false),marginTop:8,fontSize:12,color:C.accent}} onClick={()=>setAddingTo(cat.id)}>+ Item toevoegen</button>
                    )}
                  </div>
                ))}
              </>
            )}

            {tab === "upload" && (
              <>
                <p style={{ color:C.textMid, fontSize:13, marginBottom:16 }}>
                  Upload je werkbon en/of magazijnbon als <strong style={{color:C.text}}>PDF, TXT of CSV</strong>. Items worden automatisch afgevinkt.
                </p>
                <FileCard label="Werkbon" icon="📋" file={werkbon} setFile={setWerkbon} />
                <FileCard label="Magazijnbon" icon="📦" file={magazijnbon} setFile={setMagazijnbon} />
                {analyseStatus && <div style={{background:C.accentBg, borderRadius:10, padding:"12px 16px", marginBottom:12, fontSize:13}}><span>⏳</span> {analyseStatus}</div>}
                {analyseError && <div style={{background:C.dangerBg, borderRadius:10, padding:"12px 16px", marginBottom:12, fontSize:13, color:C.danger}}>⚠️ {analyseError}</div>}
                <button style={{...css.btn(true), width:"100%", padding:"12px", fontSize:14, borderRadius:12}} onClick={handleAnalyse} disabled={analysing}>
                  {analysing ? "⏳ Bezig..." : "🔍 Analyseer documenten"}
                </button>
              </>
            )}

            {tab === "missing" && (
              <>
                {!foundItems ? (
                  <div style={{...css.card, textAlign:"center", padding:40}}>
                    <div style={{fontSize:40, marginBottom:12}}>📄</div>
                    <button style={css.btn(true)} onClick={()=>setTab("upload")}>Upload documenten</button>
                  </div>
                ) : (
                  <>
                    {missingRequired.length > 0 && (
                      <div style={{...css.card, border:`1.5px solid ${C.danger}44`, background:C.dangerBg}}>
                        <h2 style={css.cardTitle}>🚨 Verplichte items — ONTBREKEN</h2>
                        {missingRequired.map((req) => (
                          <div key={req.id} style={css.row}>
                            <span style={{color:C.danger,fontSize:18}}>✗</span>
                            <span style={{flex:1, color:C.text}}>{req.name}</span>
                          </div>
                        ))}
                      </div>
                    )}

                    {conditionalItems && conditionalItems.length > 0 && (
                      <div style={{...css.card, border:`1.5px solid ${C.warning}44`, background:C.warningBg}}>
                        <h2 style={css.cardTitle}>⚡ Voorwaardelijke items</h2>
                        {conditionalItems.map((item) => (
                          <div key={item.id} style={css.row}>
                            <span style={{color:C.warning,fontSize:16}}>⚡</span>
                            <div style={{flex:1}}>
                              <div style={{fontWeight:700,color:C.warning}}>{item.name}</div>
                              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{item.reason}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}

                    {missingItems.length === 0 && missingRequired.length === 0 && !conditionalItems?.length && (
                      <div style={{...css.card, textAlign:"center", padding:40}}>
                        <div style={{fontSize:40, marginBottom:12}}>🎉</div>
                        <p style={{color:C.success, fontWeight:600, margin:0}}>Alles in orde!</p>
                      </div>
                    )}
                  </>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
